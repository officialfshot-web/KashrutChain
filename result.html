<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
  <meta name="theme-color" content="#0B0D10">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">

  <title>Result — KashrutChain Verification</title>
  <meta name="description" content="View your kosher verification result with AI analysis, ingredient breakdown, and blockchain proof.">
  <link rel="canonical" href="https://officialfshot-web.github.io/KashrutChain/result.html">
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0B0D10;
      --bg-elevated: #11141A;
      --surface: rgba(30, 35, 45, 0.6);
      --border: rgba(255,255,255,0.08);
      --text: #E8E9EC;
      --text-muted: #5F6570;
      --text-secondary: #9BA0AA;
      --accent: #D9FF3C;
      --accent-dim: rgba(217, 255, 60, 0.15);
      --green: #4ADE80;
      --green-dim: rgba(74, 222, 128, 0.1);
      --red: #FF5C5C;
      --red-dim: rgba(255, 92, 92, 0.1);
      --yellow: #F5A524;
      --yellow-dim: rgba(245, 165, 36, 0.1);
      --font-sans: 'Inter', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-sans);
      background: var(--bg); color: var(--text);
      min-height: 100vh; line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    .container { max-width: 420px; margin: 0 auto; padding: 0 1.25rem 2rem; }

    /* Nav */
    .nav {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 1rem 1.25rem; border-bottom: 1px solid var(--border);
      background: rgba(11, 13, 16, 0.8); backdrop-filter: blur(16px);
      position: sticky; top: 0; z-index: 10; margin-bottom: 1.5rem;
    }
    .nav-back {
      width: 36px; height: 36px; border-radius: 10px;
      background: var(--surface); border: 1px solid var(--border);
      display: grid; place-items: center; cursor: pointer;
      color: var(--text-secondary); text-decoration: none;
      transition: background 0.2s, color 0.2s; flex-shrink: 0;
    }
    .nav-back:hover { background: var(--border); color: var(--text); }
    .nav-back svg { width: 18px; height: 18px; }
    .nav-title { font-weight: 600; font-size: 0.95rem; }

    /* Result badge */
    .result-badge {
      text-align: center; padding: 2rem 1.5rem; border-radius: 16px; margin-bottom: 1.5rem;
      position: relative; overflow: hidden; animation: badgeReveal 0.6s ease forwards;
      opacity: 0; transform: scale(0.95);
    }
    @keyframes badgeReveal {
      to { opacity: 1; transform: scale(1); }
    }
    .result-badge.verified {
      background: var(--green-dim); border: 1px solid rgba(74,222,128,0.25);
    }
    .result-badge.fraud {
      background: var(--red-dim); border: 1px solid rgba(255,92,92,0.25);
    }
    .result-badge.warning {
      background: var(--yellow-dim); border: 1px solid rgba(245,165,36,0.25);
    }
    .result-badge .icon {
      width: 48px; height: 48px; border-radius: 14px;
      display: grid; place-items: center; margin: 0 auto 0.75rem;
    }
    .result-badge.verified .icon { background: rgba(74,222,128,0.15); }
    .result-badge.fraud .icon { background: rgba(255,92,92,0.15); }
    .result-badge.warning .icon { background: rgba(245,165,36,0.15); }
    .result-badge .icon svg { width: 24px; height: 24px; }
    .result-badge.verified .icon svg { color: var(--green); }
    .result-badge.fraud .icon svg { color: var(--red); }
    .result-badge.warning .icon svg { color: var(--yellow); }
    .result-badge h2 {
      font-size: 1.25rem; font-weight: 700; margin-bottom: 0.25rem;
    }
    .result-badge.verified h2 { color: var(--green); }
    .result-badge.fraud h2 { color: var(--red); }
    .result-badge.warning h2 { color: var(--yellow); }
    .result-badge p {
      font-size: 0.8rem; color: var(--text-muted);
      font-family: var(--font-mono); letter-spacing: 0.05em;
    }

    /* Cards */
    .card {
      padding: 1.25rem; border-radius: 12px; margin-bottom: 0.75rem;
      background: var(--surface); border: 1px solid var(--border); backdrop-filter: blur(12px);
      animation: slideUp 0.5s ease forwards; opacity: 0; transform: translateY(20px);
    }
    .card:nth-child(2) { animation-delay: 0.1s; }
    .card:nth-child(3) { animation-delay: 0.15s; }
    .card:nth-child(4) { animation-delay: 0.2s; }
    .card:nth-child(5) { animation-delay: 0.25s; }
    .card:nth-child(6) { animation-delay: 0.3s; }
    @keyframes slideUp {
      to { opacity: 1; transform: translateY(0); }
    }
    .card-header {
      display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.75rem;
    }
    .card-header-icon {
      width: 32px; height: 32px; border-radius: 8px;
      display: grid; place-items: center; flex-shrink: 0;
    }
    .card-header-icon svg { width: 16px; height: 16px; }
    .card-title {
      font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--text-muted);
    }
    .card-value {
      font-size: 1.05rem; font-weight: 600; color: var(--text);
      word-break: break-word;
    }
    .card-sub {
      font-size: 0.8rem; color: var(--text-muted); margin-top: 2px;
    }

    /* Ingredients */
    .ingredient {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.6rem 0; border-bottom: 1px solid var(--border);
    }
    .ingredient:last-child { border-bottom: none; }
    .ing-name { font-size: 0.9rem; display: flex; align-items: center; gap: 0.4rem; }
    .ing-status {
      font-size: 0.7rem; padding: 3px 8px; border-radius: 6px;
      font-weight: 600; font-family: var(--font-mono); letter-spacing: 0.05em;
      text-transform: uppercase; flex-shrink: 0;
    }
    .ing-status.safe { background: rgba(74,222,128,0.15); color: var(--green); border: 1px solid rgba(74,222,128,0.2); }
    .ing-status.caution { background: rgba(245,165,36,0.15); color: var(--yellow); border: 1px solid rgba(245,165,36,0.2); }
    .ing-status.forbidden { background: rgba(255,92,92,0.15); color: var(--red); border: 1px solid rgba(255,92,92,0.2); }
    .ing-status.unknown { background: var(--border); color: var(--text-muted); border: 1px solid var(--border); }
    .ing-reason { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }

    /* Blockchain card */
    .blockchain-card { position: relative; overflow: hidden; }
    .blockchain-card::before {
      content: ''; position: absolute; top: 0; right: 0; width: 120px; height: 120px;
      background: radial-gradient(circle, rgba(74,222,128,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .tx-hash {
      font-family: var(--font-mono); font-size: 0.8rem; color: var(--green);
      word-break: break-all; margin-top: 0.5rem; line-height: 1.4;
    }
    .tx-actions {
      display: flex; gap: 0.5rem; margin-top: 0.75rem;
    }
    .tx-action {
      display: flex; align-items: center; gap: 0.4rem;
      padding: 0.5rem 0.75rem; border-radius: 8px; border: 1px solid var(--border);
      background: rgba(255,255,255,0.03); color: var(--text-secondary);
      font-size: 0.75rem; font-weight: 500; cursor: pointer;
      transition: background 0.2s, color 0.2s; text-decoration: none;
    }
    .tx-action:hover { background: rgba(255,255,255,0.06); color: var(--text); }
    .tx-action svg { width: 14px; height: 14px; }

    /* Confidence bar */
    .confidence {
      display: flex; align-items: center; gap: 0.75rem; margin-top: 0.75rem;
    }
    .confidence-bar {
      flex: 1; height: 4px; border-radius: 2px; background: var(--border); overflow: hidden;
    }
    .confidence-fill {
      height: 100%; border-radius: 2px; background: var(--green);
      transition: width 1s ease;
    }
    .confidence-text {
      font-family: var(--font-mono); font-size: 10px; color: var(--text-muted);
      white-space: nowrap;
    }

    /* Buttons */
    .actions {
      display: flex; flex-direction: column; gap: 0.75rem; margin-top: 1.5rem;
      animation: slideUp 0.5s ease 0.4s forwards; opacity: 0; transform: translateY(20px);
    }
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      width: 100%; padding: 1rem; border-radius: 12px; border: none;
      font-family: var(--font-sans); font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: transform 0.2s, box-shadow 0.3s;
      text-decoration: none;
    }
    .btn-primary {
      background: var(--accent); color: var(--bg);
      box-shadow: 0 0 30px rgba(217,255,60,0.1);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(217,255,60,0.2); }
    .btn-secondary {
      background: var(--surface); color: var(--text); border: 1px solid var(--border);
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.05); }
    .btn svg { width: 18px; height: 18px; }

    /* Empty state */
    .empty {
      text-align: center; padding: 4rem 1rem;
    }
    .empty svg { width: 48px; height: 48px; color: var(--text-muted); margin-bottom: 1rem; }
    .empty h3 { font-size: 1.1rem; color: var(--text); margin-bottom: 0.5rem; }
    .empty p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem; }
    .empty a { color: var(--accent); text-decoration: none; font-weight: 500; }

    /* Toast */
    .toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); padding: 0.75rem 1.25rem; border-radius: 10px;
      font-size: 0.85rem; display: flex; align-items: center; gap: 0.5rem;
      opacity: 0; pointer-events: none; transition: opacity 0.3s, transform 0.3s;
      z-index: 100; max-width: 90%; width: max-content;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast svg { width: 16px; height: 16px; color: var(--green); flex-shrink: 0; }
  </style>
</head>
<body>
  <div id="app"></div>

  <div class="toast" id="toast">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    <span id="toastText">Copied to clipboard</span>
  </div>

  <script>
    const result = JSON.parse(sessionStorage.getItem('scanResult') || '{}');
    const app = document.getElementById('app');

    function showToast(msg) {
      const toast = document.getElementById('toast');
      const toastText = document.getElementById('toastText');
      toastText.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    function copyTxHash() {
      if (result.txHash) {
        navigator.clipboard.writeText(result.txHash).then(() => showToast('Transaction hash copied'))
          .catch(() => showToast('Copy failed'));
      }
    }

    function shareResult() {
      const text = result.isValid
        ? `${result.product} is kosher certified (${result.symbol}) — verified by KashrutChain AI + Blockchain.`
        : `${result.product} — could not verify kosher certification. Check with KashrutChain.`;
      if (navigator.share) {
        navigator.share({ title: 'KashrutChain Verification', text });
      } else {
        navigator.clipboard.writeText(text + ' https://officialfshot-web.github.io/KashrutChain/')
          .then(() => showToast('Result copied to clipboard'));
      }
    }

    if (!result.product) {
      app.innerHTML = `
        <nav class="nav">
          <a href="index.html" class="nav-back">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          </a>
          <span class="nav-title">Verification Result</span>
        </nav>
        <div class="container">
          <div class="empty">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            <h3>No Scan Found</h3>
            <p>Scan a product label to see the verification result.</p>
            <a href="scan.html" class="btn btn-primary" style="max-width:200px;margin:0 auto;">Start Scanning</a>
          </div>
        </div>
      `;
    } else {
      const badgeClass = result.isValid ? 'verified' : 'fraud';
      const badgeTitle = result.isValid ? 'VERIFIED ON BLOCKCHAIN' : 'NOT REGISTERED';
      const badgeSub = result.isValid
        ? 'Certified by ' + result.certifier
        : 'No valid kosher certification found';
      const badgeIcon = result.isValid
        ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>'
        : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>';

      const ingredientsHtml = (result.ingredients || []).map(ing => {
        const statusClass = ing.status;
        const statusText = ing.status === 'unknown' ? '?' : ing.status;
        const reason = ing.reason ? `<div class="ing-reason">${ing.reason}</div>` : '';
        return `<div class="ingredient">
          <div><span class="ing-name">${ing.name}</span>${reason}</div>
          <span class="ing-status ${statusClass}">${statusText}</span>
        </div>`;
      }).join('');

      const confidencePercent = Math.round((result.confidence || 0.5) * 100);

      app.innerHTML = `
        <nav class="nav">
          <a href="scan.html" class="nav-back">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          </a>
          <span class="nav-title">Verification Result</span>
        </nav>
        <div class="container">
          <div class="result-badge ${badgeClass}">
            <div class="icon">${badgeIcon}</div>
            <h2>${badgeTitle}</h2>
            <p>${badgeSub}</p>
          </div>

          <div class="card">
            <div class="card-header">
              <div class="card-header-icon" style="background:rgba(217,255,60,0.1);border:1px solid rgba(217,255,60,0.2);">
                <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              </div>
              <div>
                <div class="card-title">Product</div>
                <div class="card-value">${result.product}</div>
                ${result.brand ? `<div class="card-sub">${result.brand}</div>` : ''}
              </div>
            </div>
          </div>

          <div class="card">
            <div class="card-header">
              <div class="card-header-icon" style="background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.2);">
                <svg viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
              </div>
              <div>
                <div class="card-title">Kosher Symbol</div>
                <div class="card-value">${result.symbol || 'None detected'}</div>
                ${result.certifier ? `<div class="card-sub">${result.certifier}</div>` : ''}
              </div>
            </div>
          </div>

          <div class="card">
            <div class="card-header">
              <div class="card-header-icon" style="background:rgba(245,165,36,0.1);border:1px solid rgba(245,165,36,0.2);">
                <svg viewBox="0 0 24 24" fill="none" stroke="var(--yellow)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
              </div>
              <div>
                <div class="card-title">Classification</div>
                <div class="card-value">${(result.classification || 'Unknown').toUpperCase()}</div>
                ${result.passover && result.passover !== 'unknown' ? `<div class="card-sub">Passover: ${result.passover.replace(/_/g, ' ')}</div>` : ''}
              </div>
            </div>
            <div class="confidence">
              <div class="confidence-bar"><div class="confidence-fill" style="width:0%"></div></div>
              <span class="confidence-text">${confidencePercent}% confidence</span>
            </div>
          </div>

          <div class="card">
            <div class="card-header">
              <div class="card-header-icon" style="background:rgba(155,89,182,0.1);border:1px solid rgba(155,89,182,0.2);">
                <svg viewBox="0 0 24 24" fill="none" stroke="#B794F4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
              </div>
              <div class="card-title">Ingredients</div>
            </div>
            ${ingredientsHtml || '<div style="color:var(--text-muted);font-size:0.85rem;">No ingredients extracted.</div>'}
          </div>

          <div class="card blockchain-card">
            <div class="card-header">
              <div class="card-header-icon" style="background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.2);">
                <svg viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </div>
              <div class="card-title">Blockchain Proof</div>
            </div>
            <div class="tx-hash">${result.txHash || 'N/A'}</div>
            <div class="card-sub" style="margin-top:0.25rem;">Verified on Polygon PoS. Immutable and tamper-proof.</div>
            <div class="tx-actions">
              <button class="tx-action" onclick="copyTxHash()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                Copy
              </button>
              <a class="tx-action" href="${result.explorerUrl || '#'}" target="_blank" rel="noopener">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                Explorer
              </a>
            </div>
          </div>

          ${result.notes ? `<div class="card"><div class="card-title">Notes</div><div style="font-size:0.85rem;color:var(--text-secondary);line-height:1.5;">${result.notes}</div></div>` : ''}

          <div class="actions">
            <button class="btn btn-primary" onclick="location.href='scan.html'">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
              Scan Another Product
            </button>
            <button class="btn btn-secondary" onclick="shareResult()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
              Share Result
            </button>
            <a href="index.html" class="btn btn-secondary">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
              Back to Home
            </a>
          </div>
        </div>
      `;

      // Animate confidence bar after render
      setTimeout(() => {
        const fill = document.querySelector('.confidence-fill');
        if (fill) fill.style.width = confidencePercent + '%';
      }, 400);
    }
  </script>
</body>
</html>
