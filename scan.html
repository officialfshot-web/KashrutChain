<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
  <meta name="theme-color" content="#0B0D10">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">

  <title>Scan — KashrutChain AI Kosher Scanner</title>
  <meta name="description" content="Scan any product label with AI to instantly verify kosher certification. Works on all devices including kosher phones.">
  <link rel="canonical" href="https://officialfshot-web.github.io/KashrutChain/scan.html">
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0B0D10;
      --bg-elevated: #11141A;
      --surface: rgba(30, 35, 45, 0.6);
      --border: rgba(255,255,255,0.08);
      --text: #E8E9EC;
      --text-muted: #5F6570;
      --text-secondary: #9BA0AA;
      --accent: #D9FF3C;
      --accent-dim: rgba(217, 255, 60, 0.15);
      --green: #4ADE80;
      --red: #FF5C5C;
      --yellow: #F5A524;
      --font-sans: 'Inter', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* Nav */
    .nav {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 1rem 1.25rem; border-bottom: 1px solid var(--border);
      background: rgba(11, 13, 16, 0.8); backdrop-filter: blur(16px);
      position: relative; z-index: 10;
    }
    .nav-back {
      width: 36px; height: 36px; border-radius: 10px;
      background: var(--surface); border: 1px solid var(--border);
      display: grid; place-items: center; cursor: pointer;
      color: var(--text-secondary); text-decoration: none;
      transition: background 0.2s, color 0.2s; flex-shrink: 0;
    }
    .nav-back:hover { background: var(--border); color: var(--text); }
    .nav-back svg { width: 18px; height: 18px; }
    .nav-title { font-weight: 600; font-size: 0.95rem; }
    .nav-badge {
      margin-left: auto; font-family: var(--font-mono); font-size: 9px;
      letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent);
      padding: 3px 8px; border: 1px solid rgba(217,255,60,0.3); border-radius: 4px;
    }

    /* Camera area */
    .camera-area {
      flex: 1; position: relative;
      background: #000; display: flex;
      align-items: center; justify-content: center;
      overflow: hidden;
    }
    #video {
      width: 100%; height: 100%; object-fit: cover;
      position: absolute; inset: 0;
    }
    .video-fallback {
      display: none; flex-direction: column; align-items: center; gap: 1rem;
      padding: 2rem; text-align: center;
    }
    .video-fallback svg { width: 48px; height: 48px; color: var(--text-muted); }
    .video-fallback p { color: var(--text-muted); font-size: 0.9rem; }

    /* Scan overlay */
    .scan-overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; z-index: 2;
    }
    .scan-frame {
      width: 280px; height: 200px; position: relative;
    }
    .scan-frame-border {
      position: absolute; inset: 0;
      border: 2px solid rgba(217, 255, 60, 0.5);
      border-radius: 16px;
    }
    .scan-frame-corner {
      position: absolute; width: 24px; height: 24px;
      border-color: var(--accent); border-style: solid;
    }
    .scan-frame-corner.tl { top: -2px; left: -2px; border-width: 3px 0 0 3px; border-top-left-radius: 16px; }
    .scan-frame-corner.tr { top: -2px; right: -2px; border-width: 3px 3px 0 0; border-top-right-radius: 16px; }
    .scan-frame-corner.bl { bottom: -2px; left: -2px; border-width: 0 0 3px 3px; border-bottom-left-radius: 16px; }
    .scan-frame-corner.br { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; border-bottom-right-radius: 16px; }
    .scan-line {
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      box-shadow: 0 0 12px rgba(217,255,60,0.5);
      animation: scanSweep 2.5s ease-in-out infinite;
    }
    @keyframes scanSweep {
      0%, 100% { transform: translateY(0); opacity: 0.6; }
      50% { transform: translateY(198px); opacity: 1; }
    }
    .scan-label {
      position: absolute; bottom: -32px; left: 50%; transform: translateX(-50%);
      font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--accent);
      background: rgba(217,255,60,0.1); padding: 4px 12px; border-radius: 4px;
      border: 1px solid rgba(217,255,60,0.2); white-space: nowrap;
    }

    /* Preview */
    #preview {
      position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
      display: none; z-index: 1;
    }

    /* Analysis overlay */
    .analysis-overlay {
      position: absolute; inset: 0; z-index: 5;
      background: rgba(11, 13, 16, 0.85); backdrop-filter: blur(8px);
      display: none; flex-direction: column; align-items: center; justify-content: center;
      gap: 1.5rem;
    }
    .analysis-overlay.active { display: flex; }
    .spinner {
      width: 48px; height: 48px; position: relative;
    }
    .spinner-ring {
      position: absolute; inset: 0; border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: var(--accent);
      animation: spin 1s linear infinite;
    }
    .spinner-ring:nth-child(2) {
      inset: 6px; border-top-color: var(--green);
      animation-duration: 1.5s; animation-direction: reverse;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .analysis-text {
      text-align: center;
    }
    .analysis-text h3 {
      font-size: 1.1rem; font-weight: 600; margin-bottom: 0.4rem;
    }
    .analysis-text p {
      font-family: var(--font-mono); font-size: 11px; color: var(--text-muted);
      letter-spacing: 0.05em;
    }
    .analysis-steps {
      display: flex; gap: 0.5rem; margin-top: 0.5rem;
    }
    .analysis-step {
      width: 6px; height: 6px; border-radius: 50%; background: var(--border);
      transition: background 0.3s;
    }
    .analysis-step.active { background: var(--accent); }

    /* Controls */
    .controls {
      padding: 1.25rem; position: relative; z-index: 10;
      background: var(--bg); border-top: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 0.75rem;
    }
    .status-bar {
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      padding: 0.5rem; min-height: 2rem;
    }
    .status-bar .pulse-dot {
      width: 6px; height: 6px; border-radius: 50%;
      animation: statusPulse 2s infinite;
    }
    .status-bar .pulse-dot.ready { background: var(--green); }
    .status-bar .pulse-dot.error { background: var(--red); }
    .status-bar .pulse-dot.scanning { background: var(--accent); }
    @keyframes statusPulse {
      0%, 100% { opacity: 1; } 50% { opacity: 0.3; }
    }
    .status-text {
      font-family: var(--font-mono); font-size: 11px;
      color: var(--text-muted); letter-spacing: 0.05em;
    }
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      width: 100%; padding: 1rem; border-radius: 12px; border: none;
      font-family: var(--font-sans); font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: transform 0.2s, box-shadow 0.3s, opacity 0.2s;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }
    .btn-primary {
      background: var(--accent); color: var(--bg);
      box-shadow: 0 0 30px rgba(217,255,60,0.1);
    }
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(217,255,60,0.2);
    }
    .btn-primary svg { width: 20px; height: 20px; }
    .btn-secondary {
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover:not(:disabled) { background: rgba(255,255,255,0.05); }
    .btn-secondary svg { width: 18px; height: 18px; }

    /* Error toast */
    .toast {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: rgba(255, 92, 92, 0.15); border: 1px solid rgba(255, 92, 92, 0.3);
      color: var(--red); padding: 0.75rem 1.25rem; border-radius: 10px;
      font-size: 0.85rem; display: flex; align-items: center; gap: 0.5rem;
      opacity: 0; pointer-events: none; transition: opacity 0.3s, transform 0.3s;
      z-index: 100; max-width: 90%; width: max-content;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast svg { width: 16px; height: 16px; flex-shrink: 0; }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="index.html" class="nav-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </a>
    <span class="nav-title">Scan Product Label</span>
    <div class="nav-badge">AI</div>
  </nav>

  <div class="camera-area" id="cameraArea">
    <video id="video" autoplay playsinline muted></video>
    <img id="preview" alt="Captured label">

    <div class="video-fallback" id="videoFallback">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      <p>Camera access is blocked.<br>Use the gallery button below.</p>
    </div>

    <div class="scan-overlay" id="scanOverlay">
      <div class="scan-frame">
        <div class="scan-frame-border"></div>
        <div class="scan-frame-corner tl"></div>
        <div class="scan-frame-corner tr"></div>
        <div class="scan-frame-corner bl"></div>
        <div class="scan-frame-corner br"></div>
        <div class="scan-line"></div>
        <div class="scan-label">Align label here</div>
      </div>
    </div>

    <div class="analysis-overlay" id="analysisOverlay">
      <div class="spinner">
        <div class="spinner-ring"></div>
        <div class="spinner-ring"></div>
      </div>
      <div class="analysis-text">
        <h3 id="analysisTitle">Analyzing Label...</h3>
        <p id="analysisSubtitle">Sending to AI server</p>
        <div class="analysis-steps" id="analysisSteps">
          <div class="analysis-step active"></div>
          <div class="analysis-step"></div>
          <div class="analysis-step"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="status-bar">
      <span class="pulse-dot ready" id="statusDot"></span>
      <span class="status-text" id="statusText">Camera ready. Align label in frame.</span>
    </div>
    <button class="btn btn-primary" id="captureBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
      Capture & Analyze
    </button>
    <button class="btn btn-secondary" id="galleryBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      Choose from Gallery
    </button>
    <input type="file" id="fileInput" accept="image/*" style="display:none;">
  </div>

  <div class="toast" id="toast">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span id="toastText"></span>
  </div>

  <script>
    const video = document.getElementById('video');
    const preview = document.getElementById('preview');
    const captureBtn = document.getElementById('captureBtn');
    const galleryBtn = document.getElementById('galleryBtn');
    const fileInput = document.getElementById('fileInput');
    const statusText = document.getElementById('statusText');
    const statusDot = document.getElementById('statusDot');
    const scanOverlay = document.getElementById('scanOverlay');
    const analysisOverlay = document.getElementById('analysisOverlay');
    const analysisTitle = document.getElementById('analysisTitle');
    const analysisSubtitle = document.getElementById('analysisSubtitle');
    const analysisSteps = document.getElementById('analysisSteps').children;
    const videoFallback = document.getElementById('videoFallback');
    const toast = document.getElementById('toast');
    const toastText = document.getElementById('toastText');

    // Backend server URL — CHANGE THIS when you deploy to Render
    // const API_URL = 'https://kashrutchain-api.onrender.com/api/scan';
    const API_URL = 'http://localhost:3000/api/scan';

    let stream = null;

    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }
        });
        video.srcObject = stream;
        video.style.display = 'block';
        videoFallback.style.display = 'none';
        setStatus('ready', 'Camera ready. Align label in frame.');
      } catch (err) {
        console.error('Camera error:', err);
        video.style.display = 'none';
        videoFallback.style.display = 'flex';
        setStatus('error', 'Camera blocked. Use gallery instead.');
      }
    }

    function setStatus(type, text) {
      statusDot.className = 'pulse-dot ' + type;
      statusText.textContent = text;
    }

    function showToast(msg) {
      toastText.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 4000);
    }

    function setAnalysisStep(step, title, subtitle) {
      analysisTitle.textContent = title;
      analysisSubtitle.textContent = subtitle;
      for (let i = 0; i < analysisSteps.length; i++) {
        analysisSteps[i].classList.toggle('active', i <= step);
      }
    }

    startCamera();

    captureBtn.addEventListener('click', () => {
      if (!stream) {
        showToast('Camera not available. Use gallery instead.');
        return;
      }
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth || 1280;
      canvas.height = video.videoHeight || 720;
      canvas.getContext('2d').drawImage(video, 0, 0);
      const imageData = canvas.toDataURL('image/jpeg', 0.92);
      processImage(imageData);
    });

    galleryBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (event) => processImage(event.target.result);
        reader.readAsDataURL(file);
      }
    });

    async function processImage(imageData) {
      // Show preview
      preview.src = imageData;
      preview.style.display = 'block';
      video.style.display = 'none';
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
      }

      // UI state
      captureBtn.disabled = true;
      galleryBtn.disabled = true;
      scanOverlay.style.display = 'none';
      analysisOverlay.classList.add('active');
      setAnalysisStep(0, 'Uploading Image...', 'Preparing for AI analysis');

      try {
        const response = await fetch(imageData);
        const blob = await response.blob();
        const formData = new FormData();
        formData.append('image', blob, 'scan.jpg');

        setAnalysisStep(1, 'Reading Label with AI...', 'GPT-4o Vision is extracting text');

        const apiResponse = await fetch(API_URL, {
          method: 'POST',
          body: formData
        });

        setAnalysisStep(2, 'Verifying on Blockchain...', 'Checking Polygon registry');

        if (!apiResponse.ok) {
          const errorData = await apiResponse.json().catch(() => ({}));
          throw new Error(errorData.error || 'Server error ' + apiResponse.status);
        }

        const result = await apiResponse.json();

        const formattedResult = {
          isValid: result.isValid,
          symbol: result.symbol + (result.modifier ? '-' + result.modifier : ''),
          certifier: result.certifier,
          product: result.product || 'Unknown Product',
          brand: result.brand,
          manufacturer: result.manufacturer,
          country: result.country,
          ingredients: (result.ingredients || []).map(ing => ({
            name: ing.name,
            status: ing.kosher_status || 'unknown',
            reason: ing.flag_reason
          })),
          classification: result.classification || 'unknown',
          passover: result.passover || 'unknown',
          confidence: result.confidence || 0,
          notes: result.notes,
          txHash: result.txHash,
          explorerUrl: result.explorerUrl
        };

        sessionStorage.setItem('scanResult', JSON.stringify(formattedResult));
        window.location.href = 'result.html';

      } catch (err) {
        console.error('Scan failed:', err);
        analysisOverlay.classList.remove('active');
        preview.style.display = 'none';
        if (video.srcObject) video.style.display = 'block';
        else videoFallback.style.display = 'flex';
        scanOverlay.style.display = 'flex';
        captureBtn.disabled = false;
        galleryBtn.disabled = false;
        setStatus('error', 'Scan failed. Tap to retry.');
        showToast('Error: ' + err.message);
      }
    }
  </script>
</body>
</html>
